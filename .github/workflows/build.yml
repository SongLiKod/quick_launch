name: Build Windows Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package build artifact
        shell: pwsh
        run: |
          # Flutter Windows 构建产物在 build\windows\x64\runner\Release\
          $releasePath = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releasePath)) {
            # 32-bit fallback
            $releasePath = "build\windows\runner\Release"
          }
          Write-Output "Packaging from: $releasePath"
          Compress-Archive -Path "$releasePath\*" -DestinationPath quick_launch_windows.zip
          
          # 输出文件大小
          $file = Get-Item quick_launch_windows.zip
          Write-Output "Package size: $([math]::Round($file.Length / 1MB, 2)) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick_launch_windows
          path: quick_launch_windows.zip
          if-no-files-found: error

  # 当推送 tag (v1.0.0 格式) 时自动创建 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: quick_launch_windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: quick_launch_windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
