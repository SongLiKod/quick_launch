name: Build Windows Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    tags: ['v*', '[0-9]*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        shell: pwsh
        run: |
          $raw = (Select-String -Path pubspec.yaml -Pattern '^version:\s+' | Select-Object -First 1).Line
          $ver = ($raw -replace '^version:\s+', '') -replace '\+.*$', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      - name: Merge multi-resolution app icon from logo files
        run: dart run tools/merge_icons.dart

      - name: Build Windows release
        run: |
          flutter clean
          flutter build windows --release --dart-define=APP_VERSION=${{ steps.version.outputs.version }}

      - name: Package build artifact
        shell: pwsh
        run: |
          # Flutter Windows 构建产物在 build\windows\x64\runner\Release\
          $releasePath = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releasePath)) {
            # 32-bit fallback
            $releasePath = "build\windows\runner\Release"
          }
          Write-Output "Packaging from: $releasePath"

          # 将额外工具文件复制到发布目录
          Copy-Item "reset_settings.bat" "$releasePath\" -Force

          Compress-Archive -Path "$releasePath\*" -DestinationPath quick_launch_windows.zip
          
          # 输出文件大小
          $file = Get-Item quick_launch_windows.zip
          Write-Output "Package size: $([math]::Round($file.Length / 1MB, 2)) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick_launch_windows
          path: quick_launch_windows.zip
          if-no-files-found: error

  # 当推送 tag (v1.0.0 或 1.0.0) 时自动上传产物到 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: quick_launch_windows

      - name: Upload to Release via gh CLI
        run: |
          gh release upload "${{ github.ref_name }}" quick_launch_windows.zip --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
